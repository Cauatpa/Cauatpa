name: Generate Snake

on:
  workflow_dispatch
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: Cauatpa
          outputs: snake.svg

      - name: Commit snake.svg to main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add snake.svg
          git commit -m "update snake" || echo "no changes"
          git push
